<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Alpha | Food Additive Impact Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <div ws-children-template="Main">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
            <div class="container mx-auto px-4 py-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">
                            Project <span class="text-indigo-600">Alpha</span>
                        </h1>
                        <p class="text-slate-500 mt-1 font-medium">Food Additive & Health Impact Tracker</p>
                    </div>
                    <div class="relative max-w-md w-full">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input ws-var="SearchInput" type="text" class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" placeholder="Search by name or E-number (e.g. Aspartame, E621)...">
                    </div>
                </div>
            </div>
        </header>
        <main class="container mx-auto px-4 py-12">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" ws-hole="Results">
            </div>
        </main>
        <footer class="bg-gray-900 text-white py-12 mt-12">
            <div class="container mx-auto px-4 text-center">
                <p class="mb-4">Project Alpha &copy; 2026 - Built with F# and WebSharper</p>
                <p class="text-gray-500 text-sm">
                    Data provided for educational purposes. Always consult with a health professional.
                </p>
            </div>
        </footer>
        <div ws-hole="Details"></div>
    </div>
    <script src="Scripts/ProjectAlpha.min.js"></script>
</body>
</html>
